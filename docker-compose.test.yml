version: '3.8'

services:
  astra-test:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: astra-env-test
    environment:
      # Test with no API key first
      - TEST_MODE=no_key
    volumes:
      - ./test_env_vars.py:/app/test_env_vars.py
    command: python test_env_vars.py

  astra-test-with-key:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: astra-env-test-with-key
    environment:
      # Test with simulated API key
      - OPENAI_API_KEY=sk-test-key-for-format-validation
      - DISCORD_TOKEN=test-token-format
    volumes:
      - ./test_env_vars.py:/app/test_env_vars.py
    command: python test_env_vars.py